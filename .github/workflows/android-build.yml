name: Android Build

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version code (integer, must increment each release)'
        required: true
        type: number
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: npm ci
      - run: npm run lint
      - run: npm run test

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Decode keystore
        env:
          KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE" | base64 --decode > android/app/release.keystore

      - name: Build release bundle
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            -Pandroid.injected.version.code=${{ github.event.inputs.version_code }} \
            -Pandroid.injected.version.name=${{ github.event.inputs.version_name }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: chain-district-${{ github.event.inputs.version_name }}.aab
          path: android/app/build/outputs/bundle/release/*.aab
